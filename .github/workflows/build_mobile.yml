name: Build Mobile
run-name: "Build Mobile Release: ${{ inputs.flavor || github.sha }} / ${{ inputs.platform || 'all' }}"

on:
  workflow_dispatch:
    inputs:
      flavor:
        description: Build Flavor
        required: true
        default: edge
        type: choice
        options:
          - edge
          - beta
          - stable
      platform:
        description: Platform
        required: true
        default: all
        type: choice
        options:
          - all
          - android
          - ios

permissions:
  contents: read

env:
  APP_DIR: luna_lighthouse

jobs:
  prepare:
    name: Prepare
    runs-on: [self-hosted, lunalighthouse, Linux]
    outputs:
      build-number: ${{ steps.build-number.outputs.value }}
      build-flavor: ${{ steps.build-flavor.outputs.value }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Number
        id: build-number
        shell: bash
        run: |
          COUNT=$(git rev-list HEAD --count)
          echo "value=$((1000000000 + COUNT))" >> "$GITHUB_OUTPUT"

      - name: Build Flavor
        id: build-flavor
        shell: bash
        run: |
          echo "value=${{ inputs.flavor }}" >> "$GITHUB_OUTPUT"

  build-android:
    name: Build Android
    needs: [prepare]
    if: ${{ inputs.platform == 'all' || inputs.platform == 'android' }}
    runs-on: [self-hosted, lunalighthouse, Linux]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 2.7.6
          bundler-cache: false

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.29.3

      - name: Prepare Android Signing Files
        shell: bash
        run: |
          echo "${{ secrets.KEY_JKS }}" | base64 --decode > "${{ github.workspace }}/${{ env.APP_DIR }}/android/key.jks"
          echo "${{ secrets.KEY_PROPERTIES }}" | base64 --decode > "${{ github.workspace }}/${{ env.APP_DIR }}/android/key.properties"

      - name: Fetch Dependencies
        working-directory: ${{ github.workspace }}/${{ env.APP_DIR }}
        run: flutter pub get

      - name: Regenerate Build Artifacts
        working-directory: ${{ github.workspace }}/${{ env.APP_DIR }}
        run: |
          dart run environment_config:generate
          dart ./scripts/generate_localization.dart
          dart run build_runner build --delete-conflicting-outputs

      - name: Install Android Fastlane Dependencies
        working-directory: ${{ github.workspace }}/${{ env.APP_DIR }}/android
        run: bundle install

      - name: Build Android Artifacts
        working-directory: ${{ github.workspace }}/${{ env.APP_DIR }}/android
        run: |
          bundle exec fastlane build_aab build_number:${{ needs.prepare.outputs.build-number }}
          bundle exec fastlane build_apk build_number:${{ needs.prepare.outputs.build-number }}

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lunalighthouse-android-${{ needs.prepare.outputs.build-flavor }}
          path: |
            ${{ github.workspace }}/${{ env.APP_DIR }}/output/lunalighthouse-android.aab
            ${{ github.workspace }}/${{ env.APP_DIR }}/output/lunalighthouse-android.apk

      - name: Clean up Android signing files
        if: always()
        shell: bash
        run: |
          rm -f "${{ github.workspace }}/${{ env.APP_DIR }}/android/key.jks"
          rm -f "${{ github.workspace }}/${{ env.APP_DIR }}/android/key.properties"

  build-ios:
    name: Build iOS
    needs: [prepare]
    if: ${{ inputs.platform == 'all' || inputs.platform == 'ios' }}
    runs-on: [self-hosted, lunalighthouse, macOS]
    env:
      AGENT_TOOLSDIRECTORY: ${{ github.workspace }}/.runner-tool-cache
      RUNNER_TOOL_CACHE: ${{ github.workspace }}/.runner-tool-cache
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 2.7.6
          bundler-cache: false

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.29.3

      - name: Setup Match SSH Key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MATCH_SSH_PRIVATE_KEY }}

      - name: Fetch Dependencies
        working-directory: ${{ github.workspace }}/${{ env.APP_DIR }}
        run: flutter pub get

      - name: Regenerate Build Artifacts
        working-directory: ${{ github.workspace }}/${{ env.APP_DIR }}
        run: |
          dart run environment_config:generate
          dart ./scripts/generate_localization.dart
          dart run build_runner build --delete-conflicting-outputs

      - name: Install iOS Fastlane Dependencies
        working-directory: ${{ github.workspace }}/${{ env.APP_DIR }}/ios
        run: bundle install

      - name: Prepare App Store Connect API Key
        working-directory: ${{ github.workspace }}/${{ env.APP_DIR }}/ios
        shell: bash
        env:
          APPLE_STORE_CONNECT_KEY_CONTENT: ${{ secrets.APPLE_STORE_CONNECT_KEY_CONTENT }}
          APPLE_STORE_CONNECT_KEY_ID: ${{ secrets.APPLE_STORE_CONNECT_KEY_ID }}
        run: |
          printf '%s' "$APPLE_STORE_CONNECT_KEY_CONTENT" > "AuthKey_${APPLE_STORE_CONNECT_KEY_ID}.p8"

      - name: Build iOS Artifact
        working-directory: ${{ github.workspace }}/${{ env.APP_DIR }}/ios
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ITC_TEAM_ID: ${{ secrets.APPLE_ITC_TEAM_ID }}
          APPLE_STORE_CONNECT_ISSUER_ID: ${{ secrets.APPLE_STORE_CONNECT_ISSUER_ID }}
          APPLE_STORE_CONNECT_KEY_FILEPATH: AuthKey_${{ secrets.APPLE_STORE_CONNECT_KEY_ID }}.p8
          APPLE_STORE_CONNECT_KEY_ID: ${{ secrets.APPLE_STORE_CONNECT_KEY_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          FASTLANE_USER: ${{ secrets.APPLE_ID }}
          IOS_CODESIGNING_IDENTITY: ${{ secrets.IOS_CODESIGNING_IDENTITY }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_KEYCHAIN_NAME: ${{ secrets.MATCH_KEYCHAIN_NAME }}
          MATCH_KEYCHAIN_PASSWORD: ${{ secrets.MATCH_KEYCHAIN_PASSWORD }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        run: bundle exec fastlane build_appstore build_number:${{ needs.prepare.outputs.build-number }}

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lunalighthouse-ios-${{ needs.prepare.outputs.build-flavor }}
          path: ${{ github.workspace }}/${{ env.APP_DIR }}/output/lunalighthouse-ios.ipa

      - name: Clean up iOS signing keychain
        if: always()
        working-directory: ${{ github.workspace }}/${{ env.APP_DIR }}/ios
        env:
          MATCH_KEYCHAIN_NAME: ${{ secrets.MATCH_KEYCHAIN_NAME }}
        run: |
          rm -f AuthKey_*.p8
          bundle exec fastlane keychain_delete || true
