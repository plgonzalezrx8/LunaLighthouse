appId: app.lunalighthouse.lunalighthouse.debug
name: Android settings about smoke
tags:
  - android
  - smoke
  - settings
---
- launchApp
- assertVisible: "LunaLighthouse"
- tapOn: "Go to Settings"
- assertVisible: "Settings"
- scrollUntilVisible:
    element: "About"
    direction: DOWN
- assertVisible: "About"
- tapOn: "About"
- assertVisible: "Version"
- assertVisible: "Build"
- assertVisible: "Package"
- assertVisible: "Open Source"
- tapOn: "Open Source"
- assertVisible: "Open Source Packages"
- scrollUntilVisible:
    element: "archive"
    direction: DOWN
- assertVisible: "archive"
- assertVisible: "args"
